<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUDRA Dashboard</title>

<link rel="stylesheet" href="dashboard.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="sidebar">
  <div class="logo">
    <i class="fa-solid fa-shield-halved"></i>
    <h2>RUDRA</h2>
  </div>

  <ul>
    <li class="active"><i class="fa-solid fa-house"></i><span>Dashboard</span></li>
    <li><i class="fa-solid fa-server"></i><span>Servers</span></li>
    <li><i class="fa-solid fa-coins"></i><span>Economy</span></li>
    <li><i class="fa-solid fa-ticket"></i><span>Tickets</span></li>
    <li><i class="fa-solid fa-music"></i><span>Music</span></li>
    <li><i class="fa-solid fa-shield-halved"></i><span>Moderation</span></li>
    <li><i class="fa-solid fa-gear"></i><span>Settings</span></li>
  </ul>
</div>

<div class="main">

<header>
  <h1>Dashboard</h1>

  <div class="profile">
    <img src="https://cdn.discordapp.com/embed/avatars/0.png">
    <span>Rudra Owner</span>
  </div>
</header>

<div class="cards">

  <div class="card">
    <h3>Servers</h3>
    <h1 id="servers">0</h1>
  </div>

  <div class="card">
    <h3>Users</h3>
    <h1 id="users">0</h1>
  </div>

  <div class="card">
    <h3>Ping</h3>
    <h1 id="ping">0ms</h1>
  </div>

  <div class="card">
    <h3>Status</h3>
    <h1 id="status">Loading...</h1>
  </div>

</div>

<div class="analytics">

  <div class="card">
    <h3>Commands</h3>
    <h1>150+</h1>
  </div>

  <div class="card">
    <h3>Bot Version</h3>
    <h1>v1.0.0</h1>
  </div>

  <div class="card">
    <h3>Uptime</h3>
    <h1 id="uptime">Loading...</h1>
  </div>

  <div class="card">
    <h3>Database</h3>
    <h1 id="database">Connected</h1>
  </div>

</div>

<section class="panel">
  <h2>Quick Actions</h2>

  <div class="action-grid">

    <button><i class="fa-solid fa-coins"></i> Economy</button>
    <button><i class="fa-solid fa-shield-halved"></i> Moderation</button>
    <button><i class="fa-solid fa-ticket"></i> Tickets</button>
    <button><i class="fa-solid fa-music"></i> Music</button>
    <button><i class="fa-solid fa-robot"></i> AI</button>
    <button><i class="fa-solid fa-gear"></i> Settings</button>

  </div>
</section>

</div>

<script src="dashboard.js"></script>

</body>
</html>
