<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexora Dashboard</title>

<link rel="stylesheet" href="dashboard.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div id="loader">
    <div class="loader-ring"></div>
    <h2>NEXORA</h2>
</div>

<div class="background"></div>

<div class="dashboard">

    <aside class="sidebar">

        <div class="logo">

            <img src="assets/logo.png">

            <h2>NEXORA</h2>

        </div>

        <nav>

            <button data-page="dashboard">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </button>

            <button data-page="server">
                <i class="fa-solid fa-server"></i>
                Server
            </button>

            <button data-page="moderation">
                <i class="fa-solid fa-shield-halved"></i>
                Moderation
            </button>

            <button data-page="automod">
                <i class="fa-solid fa-robot"></i>
                AutoMod
            </button>

            <button data-page="economy">
                <i class="fa-solid fa-coins"></i>
                Economy
            </button>

            <button data-page="tickets">
                <i class="fa-solid fa-ticket"></i>
                Tickets
            </button>

            <button data-page="giveaway">
                <i class="fa-solid fa-gift"></i>
                Giveaways
            </button>

            <button data-page="music">
                <i class="fa-solid fa-music"></i>
                Music
            </button>

            <button data-page="analytics">
                <i class="fa-solid fa-chart-line"></i>
                Analytics
            </button>

            <button data-page="settings">
                <i class="fa-solid fa-gear"></i>
                Settings
            </button>

            <button id="ownerPanel" style="display:none;">
                👑 Owner Panel
            </button>

        </nav>

    </aside>

    <main class="content">

        <header>

            <h1>Nexora Dashboard</h1>

            <div class="profile">

                <img id="avatar">

                <span id="username">
                    Loading...
                </span>

            </div>

        </header>

        <div class="server-select">

            <label>Select Server</label>

            <select id="serverSelect">

                <option>
                    Loading...
                </option>

            </select>

        </div>

        <div id="pages">

<section class="page active" id="dashboard">

<div class="cards">

<div class="card">
<h3>Status</h3>
<h1 id="status">Loading...</h1>
</div>

<div class="card">
<h3>Ping</h3>
<h1 id="ping">0 ms</h1>
</div>

<div class="card">
<h3>Servers</h3>
<h1 id="servers">0</h1>
</div>

<div class="card">
<h3>Users</h3>
<h1 id="users">0</h1>
</div>

<div class="card">
<h3>Commands</h3>
<h1 id="commands">0</h1>
</div>

<div class="card">
<h3>RAM Usage</h3>
<h1 id="ram">0 MB</h1>
</div>

<div class="card">
<h3>Node.js</h3>
<h1 id="node">Loading...</h1>
</div>

<div class="card">
<h3>Database</h3>
<h1 id="database">Loading...</h1>
</div>

</div>

</section>

<section class="page" id="server">

<h2>Server Settings</h2>

<div class="settings-grid">

<div class="setting">

<label>Welcome Channel</label>

<select id="welcomeChannel"></select>

</div>

<div class="setting">

<label>Leave Channel</label>

<select id="leaveChannel"></select>

</div>

<div class="setting">

<label>Mod Log</label>

<select id="modLogChannel"></select>

</div>

<div class="setting">

<label>Ticket Category</label>

<select id="ticketCategory"></select>

</div>

<div class="setting">

<label>Auto Role</label>

<select id="autoRole"></select>

</div>

<div class="setting">

<label>Verification Role</label>

<select id="verifyRole"></select>

</div>

<div class="setting">

<label>Anti Link</label>

<select id="antiLink">
<option value="false">Disabled</option>
<option value="true">Enabled</option>
</select>

</div>

<div class="setting">

<label>Anti Bot</label>

<select id="antiBot">
<option value="false">Disabled</option>
<option value="true">Enabled</option>
</select>

</div>

<button id="saveSettings">
💾 Save Settings
</button>

</div>

</section>

</div>

        </div>

    </main>

</div>

<script src="dashboard.js"></script>

</body>

</html>
